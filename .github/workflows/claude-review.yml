name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Someone mentioned @claude in a PR/issue comment. Read the comment and respond.

            STRICT OUTPUT RULES — your posted comment must follow this exactly:
            - Maximum 3 lines total
            - No headers, no task lists, no bold sections
            - Start with ✅ or ❌ or the direct answer
            - If listing issues: one bullet per line, nothing else

            Examples of correct responses:
            ✅ LGTM — issue addressed, no violations.
            ❌ No linked issue (`Closes #N` missing). Add it and push.
            ❌ Two issues: `print()` on line 47, batch size 500 (must be ≤ 100).

            Context:
            PR/Issue: ${{ github.event.issue.number }}
            Comment: ${{ github.event.comment.body }}
            Author: ${{ github.event.comment.user.login }}
