name: "Claude — PR Review & Auto-Merge"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  auto-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for agrigpt-backend-common-rag (Python RAG pipeline).

            PR: "${{ github.event.pull_request.title }}" by @${{ github.event.pull_request.user.login }}
            Body: ${{ github.event.pull_request.body }}

            RUN THESE CHECKS IN ORDER:

            1. ISSUE LINK — scan PR body for "Closes #N", "Fixes #N", "Resolves #N"
               If missing → label claude:rejected, post:
               "❌ No linked issue. Add `Closes #N` to your PR description."
               Then STOP.

            2. FETCH DATA:
               gh issue view [N] --json title,body
               gh pr diff ${{ github.event.pull_request.number }}

            3. CHECK (flag only failures):
               - PR addresses the issue?
               - No hardcoded secrets?
               - Uses logging not print()?
               - Type hints + docstrings on public functions?
               - Pinecone batch ≤ 100 and dim = 384 (if applicable)?
               - No bare except or silent failures?

            4. DECIDE:

            IF ALL PASS:
              gh pr edit ${{ github.event.pull_request.number }} --add-label "claude:approved" 2>/dev/null || true
              gh pr review ${{ github.event.pull_request.number }} --approve --body "✅ **Approved** — Closes #[N]

            [One sentence: what this PR does and why it's correct.]

            _Auto-approved · In merge queue_"
              gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch 2>/dev/null || true

            IF ANY FAIL:
              gh pr edit ${{ github.event.pull_request.number }} --add-label "claude:rejected" 2>/dev/null || true
              gh pr review ${{ github.event.pull_request.number }} --request-changes --body "❌ **Changes needed** — #[N]

            [Bullet list — one line per issue, specific and actionable]

            _Fix the above and push — Claude will re-review._"

  manual-review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude review')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Manual Re-Review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            @${{ github.event.comment.user.login }} triggered re-review of PR #${{ github.event.issue.number }}.

            1. gh pr view ${{ github.event.issue.number }} --json body,title
            2. Extract issue number → gh issue view [N] --json title,body
            3. gh pr diff ${{ github.event.issue.number }}
            4. Check: issue addressed, no secrets, logging used, type hints, RAG standards (batch≤100, dim=384)
            5. Post short verdict (approved ✅ or changes needed ❌ with bullet list)
            6. Update label (claude:approved or claude:rejected)
            7. If approved: gh pr merge ${{ github.event.issue.number }} --auto --squash

            Keep the review comment under 10 lines. Be direct.
