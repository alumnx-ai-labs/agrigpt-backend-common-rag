name: "Claude — Issue Quality Gate"

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  validate-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude Issue Validator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Validate issue #${{ github.event.issue.number }} for agrigpt-backend-common-rag.

            Title : ${{ github.event.issue.title }}
            Body  : ${{ github.event.issue.body }}

            TITLE must:
            - Start with: Bug:, Feature:, Fix:, Docs:, Chore:, Enhancement:, Test:, or Perf:
            - Have ≥15 meaningful chars after the prefix
            - Not use only vague words (broken, fix, help, error, issue, update, problem)
            - Relate to the project (PDF, chunking, embeddings, Pinecone, RAG, pipeline)

            BODY must:
            - Be ≥120 characters
            - Bug: include actual behaviour, expected behaviour, reproduction steps
            - Feature: include problem, proposed solution, acceptance criteria
            - No placeholders (TBD, TODO, "describe here")

            IF FAILS:
              gh issue edit ${{ github.event.issue.number }} --add-label "invalid"
              Post: "❌ **Invalid issue** — [one sentence: exact reason]
            Fix: [one corrected example line]"
              gh issue close ${{ github.event.issue.number }} --reason "not planned"

            IF PASSES:
              gh issue edit ${{ github.event.issue.number }} --add-label "valid-issue"
              Post: "✅ **Valid** — Add \`Closes #${{ github.event.issue.number }}\` to your PR."

            Keep comments to 3 lines max.
